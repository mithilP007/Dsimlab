version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: simlab-postgres
    restart: always
    environment:
      POSTGRES_DB: simlab
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: simlabpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d simlab"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: simlab-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: simlab-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:simlabpassword@postgres:5432/simlab?schema=public
      - REDIS_URL=redis://redis:6379
      - BETTER_AUTH_SECRET=simlab_better_auth_jwt_secret_must_be_32_characters
      - BETTER_AUTH_URL=http://localhost:5000
      - FRONTEND_URL=http://localhost
    volumes:
      - certs-data:/app/uploads/certificates
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 5000 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:5000
    container_name: simlab-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --spider http://localhost/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  certs-data:
    driver: local
